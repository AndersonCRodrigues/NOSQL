services:
  mongo:
    image: mongo:latest
    container_name: mongoDB
    restart: always
    ports:
      - 27018:27017
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: password
    volumes:
      - ./data:/data/db
      - mongo_data:/data/db

volumes:
  mongo_data: